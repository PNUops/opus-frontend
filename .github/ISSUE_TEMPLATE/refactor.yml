name: ♻️ 리팩토링
description: 기존 동작을 유지하면서 코드 구조와 유지보수성을 개선합니다.
title: '[Refactor] ♻️ '
labels:
  - '♻️ refactor'

body:
  - type: textarea
    id: target
    attributes:
      label: 대상 및 현재 문제
      description: 리팩토링 대상과 현재 구조의 문제를 작성해주세요.
      placeholder: |
        대상:
        관리자 대회 사이드바의 대회 선택 및 라우팅 로직

        현재 문제:
        - 상태 관리와 라우팅 로직이 컴포넌트에 혼재되어 있습니다.
        - 동일한 로직이 여러 컴포넌트에 중복되어 있습니다.
    validations:
      required: true

  - type: textarea
    id: direction
    attributes:
      label: 개선 방향
      description: 적용하려는 구조와 주요 변경 내용을 작성해주세요.
      placeholder: |
        - 대회 선택 로직을 별도 훅으로 분리합니다.
        - 페이지 이동 정책을 공통 함수로 통합합니다.
        - 사용자 관점의 기존 동작은 유지합니다.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 완료 조건
      description: 리팩토링 완료 여부를 확인할 기준을 작성해주세요.
      placeholder: |
        - [ ] 기존 기능의 동작이 유지됩니다.
        - [ ] 중복 코드가 제거됩니다.
        - [ ] 기존 테스트가 모두 통과합니다.
        - [ ] 필요한 테스트가 추가됩니다.
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 관련 자료
      description: 관련 코드, 이슈, PR 또는 문서 링크를 작성해주세요.
      placeholder: |
        - 관련 코드:
        - 관련 이슈:
        - 관련 PR:
