name: ✨ 기능 개발
description: 새로운 기능을 추가하거나 기존 기능을 개선합니다.
title: '[Feature] ✨ '
labels:
  - '✨ feature'

body:
  - type: textarea
    id: background
    attributes:
      label: 배경 및 목적
      description: 기능이 필요한 이유와 해결하려는 문제를 작성해주세요.
      placeholder: |
        관리자가 프로젝트별 제출 현황을 한눈에 확인할 수 있도록 합니다.
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: 기능 요구사항
      description: 구현해야 할 내용을 구체적으로 작성해주세요.
      placeholder: |
        - 관리자가 제출물과 제출 기한을 설정할 수 있어야 합니다.
        - 프로젝트별 제출 여부와 상태를 확인할 수 있어야 합니다.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 완료 조건
      description: 이슈를 완료로 판단할 수 있는 기준을 작성해주세요.
      placeholder: |
        - [ ] 요구사항에 명시된 기능이 정상적으로 동작합니다.
        - [ ] 권한별 접근이 정상적으로 제한됩니다.
        - [ ] 관련 테스트 또는 QA를 완료했습니다.
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: Figma, API 명세, 관련 이슈 등의 링크를 작성해주세요.
      placeholder: |
        - Figma:
        - API 명세:
        - 관련 이슈:
