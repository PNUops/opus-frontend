name: 🛠️ 일반 작업
description: 설정, 문서화, 조사, QA 또는 운영 작업을 기록합니다.
title: '[Task] 🛠️ '
labels:
  - '🧹 chore'

body:
  - type: dropdown
    id: category
    attributes:
      label: 작업 유형
      options:
        - 프로젝트 설정
        - 문서화
        - 테스트 및 QA
        - 배포 및 운영
        - 인프라
        - 기술 조사
        - 데이터 관리
        - 기타
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 배경 및 목적
      description: 작업이 필요한 이유와 달성하려는 목적을 작성해주세요.
      placeholder: |
        신규 팀원이 프로젝트 환경을 빠르게 구성할 수 있도록
        로컬 개발 환경 설정 문서를 정리합니다.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 내용
      description: 수행할 작업을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] 환경 변수 목록을 정리합니다.
        - [ ] 프론트엔드 실행 방법을 작성합니다.
        - [ ] 백엔드 실행 방법을 작성합니다.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 완료 조건
      description: 작업을 완료로 판단할 수 있는 기준을 작성해주세요.
      placeholder: |
        - [ ] 계획한 작업을 모두 완료했습니다.
        - [ ] 결과물이 현재 프로젝트 상태와 일치합니다.
        - [ ] 필요한 검토 또는 QA를 완료했습니다.
    validations:
      required: true
